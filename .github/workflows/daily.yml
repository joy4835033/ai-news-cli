name: Daily News

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config \
            -a $COS_SECRET_ID \
            -s $COS_SECRET_KEY \
            -b dailynews-1419760006 \
            -r ap-shanghai
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}

      - name: Download history from COS
        run: coscmd download -r / dist/ --ignore "dist/" || true

      - name: Build
        run: npx tsx src/build.ts
        env:
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}

      - name: Upload to COS
        run: |
          coscmd upload -r dist/ / \
            -H '{"Content-Type":"text/html; charset=utf-8"}'
