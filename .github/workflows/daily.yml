name: Daily News

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config \
            -a $COS_SECRET_ID \
            -s $COS_SECRET_KEY \
            -b dailynews-1419760006 \
            -r ap-shanghai
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}

      - name: Download history from COS
        run: |
          mkdir -p output
          coscmd download -r --force / output/ || true

      - name: Clean and reinstall dependencies
        run: |
          rm -rf node_modules
          npm install

      - name: Diagnose
        run: |
          echo "=== package.json ==="
          cat package.json
          echo ""
          echo "=== node_modules/openai exists? ==="
          ls node_modules/openai 2>&1 || echo "NOT FOUND"
          echo ""
          echo "=== node_modules top level ==="
          ls node_modules | head -30
          echo ""
          echo "=== working directory ==="
          pwd
          ls -la

      - name: Build
        run: npx tsx src/build.ts
        env:
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}

      - name: Upload to COS
        run: coscmd upload -r output/ /

      - name: Commit and push output to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Auto update: $(date '+%Y-%m-%d')"
          git push
