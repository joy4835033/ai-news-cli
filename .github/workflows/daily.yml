name: Daily News

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install typescript and types
        run: npm install -g typescript && npm install --save-dev @types/node && npm install openai

      - name: Compile TypeScript
        run: tsc

      - name: Build
        run: node dist_ts/build.js
        env:
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}

      - name: Install coscli
        run: |
          wget -q https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux -O coscli
          chmod +x coscli

      - name: Upload to COS
        run: |
          ./coscli cp dist/index.html cos://dailynews-1419760006/index.html \
            -i $COS_SECRET_ID \
            -k $COS_SECRET_KEY \
            -e cos.ap-shanghai.myqcloud.com \
            --meta "Content-Type:text/html;charset=utf-8"
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
